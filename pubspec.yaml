name: fitgeniedescription: "FitGenie - Your AI Fitness Coach"publish_to: 'none'version: 1.0.0+1environment:  sdk: ">=3.0.0 <4.0.0"dependencies:  flutter:    sdk: flutter  # Firebase  firebase_core: ^3.0.0  firebase_auth: ^5.0.0  cloud_firestore: ^5.0.0  firebase_storage: ^12.0.0  # UI  google_fonts: ^6.2.1  fl_chart: ^0.68.0  # Utilities  intl: ^0.19.0  http: ^1.1.0  # Notifications  flutter_local_notifications: ^18.0.1  timezone: ^0.10.0  permission_handler: ^11.3.1  # Sensors  sensors_plus: ^4.0.0  pedometer: ^4.0.1  # Media  image_picker: ^1.0.7  google_generative_ai: ^0.4.0  # Offline Support  connectivity_plus: ^6.0.3  hive_flutter: ^1.1.0  path_provider: ^2.1.2  uuid: ^4.5.2  # Google sign-in  google_sign_in: ^6.2.1  # Security  flutter_dotenv: ^5.1.0  flutter_secure_storage: ^9.2.2  cached_network_image: ^3.3.1dev_dependencies:  flutter_test:    sdk: flutter  flutter_lints: ^5.0.0  flutter_launcher_icons: ^0.14.2  hive_generator: ^2.0.1  build_runner: ^2.4.8flutter:  uses-material-design: true  assets:    - assets/images/    - assets/icon/    - .env